# ── Server ────────────────────────────────────────────────────
server.port=8080
spring.application.name=propvio-backend

# ── MySQL (replaces MongoDB) ───────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:propvio_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT ────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiry.days=7
jwt.expiry.remember-me.days=30

# ── Email ──────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:noreply@propvio.com}
spring.mail.password=${MAIL_PASS:placeholder}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Frontend / App URLs ────────────────────────────────────────
app.website.url=${WEBSITE_URL:http://localhost:5173}
app.backend.url=${BACKEND_URL:http://localhost:8080}

# ── Spring AI — OpenAI ─────────────────────────────────────────
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=${AI_MODEL:gpt-4o-mini}
spring.ai.openai.chat.options.temperature=0.2
# No retries — invalid key fails immediately, fallback formula kicks in at once
spring.ai.retry.max-attempts=1
spring.ai.retry.on-http-codes=429

# ── ImageKit ───────────────────────────────────────────────────
imagekit.public-key=${IMAGEKIT_PUBLIC_KEY:}
imagekit.private-key=${IMAGEKIT_PRIVATE_KEY:}
imagekit.url-endpoint=${IMAGEKIT_URL_ENDPOINT:}

# ── Actuator ───────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── File upload ────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=40MB

# ── Logging ────────────────────────────────────────────────────
logging.level.com.propvio=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.ai=INFO
# Log every incoming request path (helps diagnose 403s)
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
